# =============================================================================
# Codex TLS Proxy Docker Compose
# =============================================================================
# 独立部署 Codex TLS 指纹代理服务。
#
# 用法：
#   1. docker compose -f codex-tls-proxy/docker-compose.yml up -d
#   2. 在 sub2api 的环境变量中设置：
#      CODEX_TLS_PROXY_ENABLED=true
#      CODEX_TLS_PROXY_URL=http://codex-tls-proxy:18900
#
# 注意：本服务需要与 sub2api 在同一个 Docker 网络中，
# 或通过宿主机端口映射（默认 127.0.0.1:18900）访问。
#
# 网络说明：
#   extra_hosts 把 host.docker.internal 映射到宿主机 IP，
#   使 Rust 代理能访问宿主机上运行的 proxy（如 Clash/V2Ray）。
#   账号配置的 proxy URL 如果用 172.17.0.1（默认 bridge 网关），
#   在自定义网络中可能不可达，建议改用 host.docker.internal。
# =============================================================================

services:
  codex-tls-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: codex-tls-proxy:latest
    container_name: codex-tls-proxy
    restart: unless-stopped
    ports:
      # 只暴露到本地回环，避免外部直接访问
      - "127.0.0.1:18900:18900"
    extra_hosts:
      # 让容器内 host.docker.internal 指向宿主机
      # Linux 需要 Docker 20.10+，docker-compose 会自动添加 host-gateway
      - "host.docker.internal:host-gateway"
    environment:
      - CODEX_TLS_PROXY_ADDR=0.0.0.0:18900
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      # 用 127.0.0.1 而非 localhost，避免容器内 localhost 解析到 IPv6 ::1
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:18900/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - sub2api-network

networks:
  sub2api-network:
    external: true
    name: sub2api_sub2api-network
